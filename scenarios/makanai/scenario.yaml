# 日次シミュレーションのルールに追記される、この世界の生活リズムなど
style_rules:
  - "レストランの営業時間はランチ11:30〜14:00、ディナー17:30〜22:00。仕込みは朝9時から。閉店後の片付け・翌日の仕込みで23時頃まで残ることもある。閉店後の店内は密室になる。"
  - "隣のバー「Lento」は20時開店〜深夜2時。まかないのスタッフが閉店後に流れてくることが多い。涼介のカウンターは懺悔室のような場所。"
  - "悠真と果穂は同棲しているが、最近は帰宅時間がずれることが増えている。"
  - "土曜の3周年パーティーが全員の行動の時間軸になる。準備・当日・その後——すべてがこの一点に収束する。"

# 終幕（プレイ終了の総括）の演出フレーム
finale_prompt: |
  設定: 3周年パーティー翌日の深夜。
  客が帰り、残ったのは関係者だけ。打ち上げのテーブルの上に、全員のDM・裏アカ投稿・目撃情報——すべてが印刷されて並べられています。
  誰が誰と何をしていたか、全員が初めて知ります。

