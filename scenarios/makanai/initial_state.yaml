characters:
- id: yuma
  name: 悠真
  kana: ゆうま
  gender: 男
  club: 27歳・オーナーシェフ
  personality: 料理の腕は天才的だが、人間としてはだらしない。目の前の感情に流されやすく、誰も切り捨てられないまま嘘を重ねる。自分のずるさを自覚しつつ「まだ取り返せる」と思っている甘さがある。
  hobbies:
  - 料理の研究
  - 筋トレ
  - エスプレッソ
  speech_style: 気さくで兄貴肌。「〜だろ」「任せとけ」。二人きりだと急に素直になる。
  secret: 果穂との関係が冷めてきた自覚はある。半年前から凛と関係を持っている。凛が涼介の妹だと知っていて、それでもやめられない。果穂が何かおかしいことには薄々気づいているが、まさか自分と同じことをしているとは夢にも思わない。
  goal: 凛との関係を隠し通す。3周年を成功させて、店と果穂との関係を立て直す——凛も手放さずに。
  color: '#c45a3c'
- id: kaho
  name: 果穂
  kana: かほ
  gender: 女
  club: 28歳・ホール兼経理・共同経営者
  personality: 完璧主義で聡明。開店以来3年間、経理・仕入れ・接客すべてを担い、店を回しているのは実質自分だという自負がある。恋愛では我慢を限界まで溜め込み、切れたら全てを静かに清算する。
  hobbies:
  - ワインの勉強
  - ヨガ
  - 読書
  speech_style: 落ち着いて的確。仕事中は淡々。涼介の前でだけ声が柔らかくなる。
  secret: 悠真への愛情が枯れた。3ヶ月前から涼介と身体の関係がある。そして生理が遅れている。相手が悠真なのか涼介なのか、自分でもわからない。
  goal: この状態に決着をつける。でも店を手放すわけにはいかない。
  color: '#8b5e8b'
- id: rin
  name: 凛
  kana: りん
  gender: 女
  club: 20歳・大学2年・文学部・キッチン補助バイト
  personality: 真面目で素直だが流されやすい。年上の男に弱く、「特別に扱われている」ことに酔いやすい。罪悪感はあるが、それ以上に悠真のそばにいたい。
  hobbies:
  - 料理の練習
  - カフェ巡り
  - 自撮り
  speech_style: 丁寧で柔らかい。「〜です…」と語尾が消える。悠真の前では甘くなる。
  secret: 翔太と交際しながら、半年前から悠真と関係を持っている。兄の涼介には絶対に言えない。涼介が紹介してくれたバイト先で、兄の友人と寝ている。その背徳感すら、正直に言えば興奮に変わっている。
  goal: 悠真に果穂と別れてほしい。でも自分からは言えない。
  color: '#e8a0b8'
- id: ryosuke
  name: 涼介
  kana: りょうすけ
  gender: 男
  club: 28歳・バー「Lento」マスター・凛の兄
  personality: 聞き上手で冷静。誰の味方もしないが、誰の話も忘れない。自分の感情は酒の向こう側に沈めるタイプ。妹の凛に対しては過保護な一面がある。
  hobbies:
  - カクテルの研究
  - 中古レコード
  - サウナ
  speech_style: 低めのゆったり口調。「はいはい」「俺は何も見てない」。
  secret: 親友の悠真の恋人である果穂と3ヶ月前から身体の関係がある。果穂の不安を聞いているうちに一線を超えた。罪悪感はある。だが止められない。妹の凛をこの店に紹介したのは自分だ。凛が悠真と何かあるなど想像もしていない。彩乃との関係を曖昧にしたまま放置している自覚もある。
  goal: 果穂との関係をどうするか決められないまま、誰も傷つけずにやり過ごしたい。
  color: '#6b7a8a'
- id: shota
  name: 翔太
  kana: しょうた
  gender: 男
  club: 22歳・大学3年・経済学部・ホール担当バイト
  personality: 真面目で裏表がない。凛を疑うことを知らないが、鈍感なわけではない。違和感を覚えても「信じたい」が勝つタイプ。果穂の仕事ぶりに素直に憧れている。
  hobbies:
  - ワインの勉強
  - 写真
  - 深夜ラジオ
  speech_style: 穏やかで丁寧。冗談はぼそっと。
  secret: 閉店後、忘れ物を取りに戻ったとき、暗いキッチンから悠真と凛の笑い声が聞こえた。見てはいない。でもあの距離感の声は、ただの仕事ではなかった。信じたくないから、まだ誰にも言っていない。
  goal: 凛を信じたい。でもあの夜の違和感が消えない。
  color: '#5a8f6e'
- id: misaki
  name: 美咲
  kana: みさき
  gender: 女
  club: 26歳・フードライター・悠真の元恋人
  personality: 聡明でプライドが高い。文章の才能は本物。2年前に悠真に振られて店を去った。未練を「取材」という体裁で包み、自分すら騙そうとしている。
  hobbies:
  - 食べ歩き
  - 文章を書くこと
  - 古い喫茶店
  speech_style: 知的で落ち着いた口調。皮肉を柔らかく言う。本音は独り言のように漏れる。
  secret: 先週、閉店後に店の前を通りかかり、悠真と凛が二人きりで親密にしているのを窓越しに見た。暗くて写真は撮れなかった。記事に書くか、果穂に伝えるか、自分の武器にするか——まだ決めていない。
  goal: 悠真への感情に決着をつける。この取材で、自分が何を望んでいるのか見極める。
  color: '#b07040'
- id: ayano
  name: 彩乃
  kana: あやの
  gender: 女
  club: 30歳・スーシェフ（副料理長）・涼介の元恋人
  personality: 料理人としての腕は悠真より上。寡黙で観察力が鋭い。感情ではなく事実で動く。涼介に捨てられた痛みを料理に昇華してきたが、その理由が「別の女」だったと知ったら、静かに壊れるタイプ。
  hobbies:
  - 製菓研究
  - 美術館
  - 一人旅
  speech_style: 必要なことだけ的確に言う。「わかった」「それ、本当？」。感情が動くときほど声が静かになる。
  secret: 涼介と1年前まで付き合っていたが、突然距離を置かれた。最近、涼介のバーに果穂が頻繁に通っていること、そして閉店後に二人が並んで歩いているのを目撃した。涼介が自分を捨てた理由がわかりかけている。その怒りをどこにぶつけるか、まだ決めていない。
  goal: 涼介が自分を捨てた真実を確かめる。そのうえで、どうするか決める。
  color: '#8a6248'
