# crosstalk の設定(コミットしてよいファイル)
# APIキーなどの秘密情報はここには書かず、.env に書くこと(.env.sample 参照)

# 使うシナリオパック(scenarios/<id>/)。変更後はサーバー再起動+「新しいゲーム」
scenario: loveall

# LLM のモデル指定(litellm 形式)。
# 対応プロバイダ: https://docs.litellm.ai/docs/providers
model: anthropic/claude-sonnet-4-6
# model: anthropic/claude-opus-4-8
# model: openai/gpt-5.4
# model: gemini/gemini-2.5-flash-lite
# model: xai/grok-4-fast-reasoning

# temperature: 0.9
max_tokens: 8000
